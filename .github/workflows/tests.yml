name: Automatisation des tests
on: push

jobs:

  Compilation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Compilation
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ctest --output-on-failure

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3

      - name: Test fonction add
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator add 10 5