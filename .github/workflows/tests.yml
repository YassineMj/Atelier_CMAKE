name: Pipeline CI
on: push

jobs:

  Compilation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          make

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction add
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator add 10 5

  Test_Sub:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction sub
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator sub 10 5

  Test_Mul:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction mul
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator mul 10 5

  Test_Div:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction div
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator div 10 5

  Test_Car:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - uses: actions/checkout@v3
      - name: Test fonction car
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./calculator car 5

  Deploy:
    runs-on: ubuntu-latest
    needs: 
      - Test_Add
      - Test_Sub
      - Test_Mul
      - Test_Div
      - Test_Car

    steps:
      - name: Deploy step
        run: echo "Déploiement de la solution"